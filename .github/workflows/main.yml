name: Haxe Static EXE Build
on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.3.4

      - name: Install hxcpp
        run: haxelib install hxcpp

      - name: Build Static EXE
        # -cpp bin と指定すると、実は bin/Main.exe が出来上がります
        run: haxe -main Main -cpp bin -D static_link -D ABI=-MT

      - name: Check files (Debug)
        # 念のためファイルがどこにあるかログに出して確認
        run: Get-ChildItem -Recurse bin

      - name: Run EXE
        # これが Haxe (hxcpp) の標準的な出力パスです
        run: .\bin\Main.exe "GitHub-Actions"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: standalone-haxe-exe
          path: bin/Main.exe

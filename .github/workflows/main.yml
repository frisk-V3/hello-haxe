name: Haxe CI
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.3.4

      - name: Run
        # Main.hx をインタープリタで実行し、引数に "GitHub-Actions" を渡す
        run: haxe --main Main --interp -- "GitHub-Actions"

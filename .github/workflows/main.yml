name: Self-Healing Haxe Build
on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.3.4

      - name: Install hxcpp
        run: haxelib install hxcpp

      - name: Build
        run: haxe -main Main -cpp bin -D static_link -D ABI=-MT

      - name: Find and Run EXE (Auto-detect)
        shell: pwsh
        run: |
          # binフォルダの中から .exe を自動で探し出す
          $exePath = (Get-ChildItem -Path bin -Filter Main.exe -Recurse | Select-Object -First 1).FullName
          if ($exePath) {
              Write-Host "EXEを発見: $exePath"
              # 見つけたパスで実行！
              & $exePath "GitHub-Actions"
              # 後続のステップ（Upload）のために環境変数に保存
              echo "EXE_PATH=$exePath" >> $env:GITHUB_ENV
          } else {
              Write-Error "EXEが見つかりませんでした"
              exit 1
          }

      - name: Upload Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: auto-detected-exe
          path: ${{ env.EXE_PATH }}

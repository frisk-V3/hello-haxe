name: Haxe Static EXE Build
on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.3.4

      - name: Install hxcpp
        run: haxelib install hxcpp

      - name: Build Static EXE
        # -D ABI=-MT でランタイムを埋め込む（静的リンク）
        run: haxe -main Main -cpp bin -D static_link -D ABI=-MT

      - name: Run EXE
        # WindowsのPowerShellではバックスラッシュ \ を使い、
        # かつHaxeのデフォルト出力先である「bin/Main.exe」を指定
        run: .\bin\Main.exe "GitHub-Actions"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: standalone-haxe-exe
          # ここも実際のパスに合わせて修正
          path: bin/Main.exe

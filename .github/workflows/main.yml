name: Ultimate Haxe Build
on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.3.4

      - name: Install hxcpp
        run: haxelib install hxcpp

      - name: Build with Verbose
        # -v をつけてコンパイルの全行程（エラー含む）を表示
        # -D MSVC_RUNTIME=static で静的リンクをより確実に
        run: haxe -main Main -cpp bin -D static_link -D ABI=-MT -v

      - name: Force Find and Run
        shell: pwsh
        run: |
          Write-Host "--- 全ファイルリスト確認 ---"
          Get-ChildItem -Recurse
          
          $exe = Get-ChildItem -Filter "*.exe" -Recurse | Select-Object -First 1
          if ($exe) {
              Write-Host "発見したEXE: $($exe.FullName)"
              & $exe.FullName "GitHub-Actions"
              echo "EXE_PATH=$($exe.FullName)" >> $env:GITHUB_ENV
          } else {
              Write-Error "EXEがこのリポジトリのどこにも存在しません！コンパイル失敗の可能性があります。"
              exit 1
          }

      - name: Upload
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: fixed-exe
          path: ${{ env.EXE_PATH }}

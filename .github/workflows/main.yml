name: Haxe Static EXE Build
on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.3.4

      - name: Install hxcpp
        run: haxelib install hxcpp

      - name: Build Static EXE
        # -D static_link: ライブラリを静的に結合
        # -D ABI=-MT: MSVCに「ランタイム(VC++)をEXEに埋め込め」と指示
        run: haxe -main Main -cpp bin -D static_link -D ABI=-MT

      - name: Run EXE
        run: ./bin/Main.exe "GitHub-Actions"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: standalone-haxe-exe
          path: bin/Main.exe
